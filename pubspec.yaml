name: plant_app
description: A cross-platform plant disease detection app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Fonts
  google_fonts: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0
  
  # State Management
  provider: ^6.1.1
  
  # Image Handling
  image_picker: ^1.0.7
  cross_file: ^0.3.3+6
  cached_network_image: ^3.3.0  # Added (Recommended for History screen)

  # Networking
  http: ^1.2.0
  http_parser: ^4.0.2
  flutter_dotenv: ^6.0.0
  
  # Storage
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  
  # Utilities
  uuid: ^4.3.3
  connectivity_plus: ^6.0.0     # Note: v7 sometimes has breaking changes, v6 is safer for now
  google_generative_ai: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1 # The package dependency stays here

# --- CONFIGURATION SECTION (MUST BE AT ROOT LEVEL) ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png" 
  min_sdk_android: 21
  adaptive_icon_background: "#10B981"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/    # Ensure you declare your assets folder here!